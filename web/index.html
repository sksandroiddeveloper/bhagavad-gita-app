<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Bhagavad Gita - Beautiful Shlok Reader with Hindi and English explanations">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Gita">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>श्रीमद्भगवद्गीता · Bhagavad Gita</title>
  <link rel="manifest" href="manifest.json">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background-color: #0D0A1A;
      margin: 0;
      padding: 0;
    }
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0D0A1A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #loading .om {
      color: #FFB730;
      font-size: 80px;
      animation: pulse 2s ease-in-out infinite;
    }
    #loading p {
      color: #FF6B1A;
      font-family: serif;
      font-size: 18px;
      letter-spacing: 4px;
      margin-top: 16px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="om">ॐ</div>
    <p>BHAGAVAD GITA</p>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loading').style.opacity = '0';
      document.getElementById('loading').style.transition = 'opacity 0.5s';
      setTimeout(() => document.getElementById('loading').remove(), 600);
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
